name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'

jobs:

  psalm:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run Psalm
        run: vendor/bin/psalm

  build:
    runs-on: ubuntu-latest
    needs: psalm

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Generate Docker metadata
        id: meta
        run: |
          BRANCH_NAME="${{ github.ref_name }}"
          COMMIT_SHA="${{ github.sha }}"

          # Determine tags based on branch
          if [[ "$BRANCH_NAME" == "main" || "$BRANCH_NAME" == "master" ]]; then
            echo "tags=tsgames/pms:latest,tsgames/pms:${COMMIT_SHA:0:7},tsgames/pms:${BRANCH_NAME}" >> $GITHUB_OUTPUT
          else
            echo "tags=tsgames/pms:${BRANCH_NAME},tsgames/pms:${COMMIT_SHA:0:7}" >> $GITHUB_OUTPUT
          fi

          echo "commit_sha=${COMMIT_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=registry,ref=tsgames/pms:buildcache
          cache-to: type=registry,ref=tsgames/pms:buildcache,mode=max