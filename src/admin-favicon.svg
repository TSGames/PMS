<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2"/>
      <stop offset="100%" style="stop-color:#0d47a1"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" ry="7" fill="url(#bg)"/>

  <!-- Subtle top shine -->
  <rect width="32" height="16" rx="7" ry="7" fill="url(#shine)"/>

  <!-- Dashboard grid icon: 2x2 blocks with gap -->
  <!-- Top-left block -->
  <rect x="5" y="5" width="9" height="9" rx="1.5" fill="#ffffff" opacity="0.95"/>
  <!-- Top-right block (taller, accent) -->
  <rect x="18" y="5" width="9" height="13" rx="1.5" fill="#90caf9" opacity="0.95"/>
  <!-- Bottom-left block (taller) -->
  <rect x="5" y="18" width="9" height="9" rx="1.5" fill="#64b5f6" opacity="0.95"/>
  <!-- Bottom-right block (shorter) -->
  <rect x="18" y="22" width="9" height="5" rx="1.5" fill="#ffffff" opacity="0.95"/>
</svg>
